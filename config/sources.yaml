# Sources à scraper. Catégorisées par secteur.
# Chaque source est soit un flux RSS, soit une page carrière HTML.
# Les URLs et sélecteurs CSS sont des points de départ — à vérifier lors du premier run
# et à ajuster si le site a changé.
#
# Périmètre géographique : Europe (UK, France, Benelux, DACH, Nordics, Iberia, Italy, Switzerland)
# + Canada. Ajuster `preferred_geographies` dans config/jobs.yaml.

job_boards:
  rss:
    - name: Welcome to the Jungle — Senior & Lead FR
      url: https://www.welcometothejungle.com/fr/jobs.rss?query=senior%20OR%20lead%20OR%20head&refinementList%5Bcontract_type%5D%5B0%5D=full_time
    - name: Indeed — Director Banking France
      url: https://fr.indeed.com/rss?q=director+banking&l=France
    - name: Indeed — Head of Sales Fintech Europe
      url: https://fr.indeed.com/rss?q=head+of+sales+fintech&l=Europe
    - name: Indeed CA — Director / VP
      url: https://ca.indeed.com/rss?q=%22director%22+OR+%22vp%22&l=Canada
    - name: eFinancialCareers — Director+ EMEA
      url: https://www.efinancialcareers.com/rss/search?q=director&l=Europe
    - name: eFinancialCareers — Trade Finance VP+
      url: https://www.efinancialcareers.com/rss/search?q=trade+finance+vp&l=Europe
    - name: eFinancialCareers — Working Capital Director
      url: https://www.efinancialcareers.com/rss/search?q=working+capital+director&l=Europe
    - name: eFinancialCareers — Head of Trade Finance
      url: https://www.efinancialcareers.com/rss/search?q=head+of+trade+finance
    - name: eFinancialCareers — Transaction Banking VP
      url: https://www.efinancialcareers.com/rss/search?q=transaction+banking&l=Europe
    - name: Indeed — VP Trade Finance Europe
      url: https://fr.indeed.com/rss?q=vp+trade+finance&l=Europe
    - name: Indeed — Head of Product Fintech France
      url: https://fr.indeed.com/rss?q=head+of+product+fintech&l=France
  email:
    # Single broad LinkedIn filter — catches all alert types (job alert, digest, "jobs for you")
    # URL regex in the collector ensures only actual job-posting links are extracted.
    - name: LinkedIn Job Alerts
      mailbox: INBOX
      from_contains: linkedin.com
    - name: Welcome to the Jungle alerts
      mailbox: INBOX
      from_contains: welcometothejungle.com
      subject_contains: "alerte"

