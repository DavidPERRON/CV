# Job search configuration. Environment-agnostic — secrets stay in .env.

scoring:
  top_threshold: 80       # top-tier match, auto-generate application
  mid_threshold: 60       # generate only with --force
  min_jd_words: 80        # discard thin descriptions (80 allows LinkedIn email snippets through)

search:
  max_jobs_per_run: 60    # increased — process more postings per daily run
  max_docs_generated: 10
  default_language: EN
  preferred_roles:
    - "Head of"
    - "Managing Director"
    - "Director"
    - "VP"
    - "Chief"
    - "Global Head"
    - "Country Head"
    - "Product Director"
    - "Partner"
  preferred_sectors:
    - banking
    - corporate banking
    - transaction banking
    - trade finance
    - working capital
    - applied AI
    - enterprise software
    - fintech
  preferred_geographies:
    - France
    - United Kingdom
    - Benelux
    - DACH
    - Switzerland
    - Nordics
    - Iberia
    - Italy
    - Europe (remote)
    - Canada
  target_companies: []
  excluded_companies: []
  # Seniority hard-filter: any of these tokens as a whole word in the title discards the posting.
  # Kept narrow — "analyst" and "associate" removed because senior roles (e.g. "VP, Trade Analysis")
  # often carry these words in a subsidiary context.
  junior_title_blocklist:
    - intern
    - internship
    - stagiaire
    - stage
    - apprenti
    - apprentice
    - graduate
    - junior
    - entry level
    - trainee

extraction:
  timeout_seconds: 20
  user_agent: "Mozilla/5.0 (compatible; cv-agent/0.1; +https://github.com/davidPERRON/CV)"

llm:
  # Primary provider — used for every call by default.
  provider: anthropic
  model: claude-opus-4-6
  # Fallback used automatically when the primary fails (credit exhaustion,
  # rate limit, transient 5xx, or malformed JSON). Set to an OpenAI model so
  # the pipeline keeps running once Anthropic credits are depleted.
  fallback_provider: openai
  fallback_model: gpt-4o
  max_output_tokens: 8000
  temperature: 0.2

state:
  applied_jobs_cap: 1000
  applied_jobs_ttl_days: 180
  pending_applications_cap: 50

submit:
  browser: chromium
  headless: false
  user_data_dir_env: PLAYWRIGHT_USER_DATA_DIR
  abort_after_minutes: 20
