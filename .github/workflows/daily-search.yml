name: daily-search

on:
  schedule:
    # 05:45 UTC daily (07:45 Paris summer / 06:45 winter)
    - cron: "45 5 * * *"
  workflow_dispatch:
    inputs:
      language:
        description: "Output language (EN or FR)"
        required: false
        default: "EN"
      dry_run:
        description: "Smoke test: cap to a few postings, no commit, no state mutation"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      max_jobs:
        description: "Cap on postings (only used when dry_run=true)"
        required: false
        default: "3"
      with_drafts:
        description: "In dry_run, also draft full CV+cover for top N scored postings (costs LLM tokens)"
        required: false
        default: "1"

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Secrets sanity check (names only, values never printed)
        run: |
          {
            echo "### Secrets wiring (dry-run debug)"
            echo ""
            echo "- ANTHROPIC_API_KEY: $([ -n \"${{ secrets.ANTHROPIC_API_KEY }}\" ] && echo OK || echo MISSING)"
            echo "- OPENAI_API_KEY:    $([ -n \"${{ secrets.OPENAI_API_KEY }}\" ] && echo OK || echo MISSING)"
            echo "- LINKEDIN_EMAIL:    $([ -n \"${{ secrets.LINKEDIN_EMAIL }}\" ] && echo OK || echo MISSING)"
            echo "- GMAIL_APP_PASSWORD:$([ -n \"${{ secrets.GMAIL_APP_PASSWORD }}\" ] && echo OK || echo MISSING)"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run search (captures stdout+stderr to run.log)
        id: run_search
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
          MAX_JOBS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_jobs || '' }}
          WITH_DRAFTS: ${{ github.event_name == 'workflow_dispatch' && inputs.with_drafts || '0' }}
        run: |
          set +e
          ARGS="-v"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
            if [ -n "$MAX_JOBS" ]; then
              ARGS="$ARGS --max-jobs $MAX_JOBS"
            fi
            if [ -n "$WITH_DRAFTS" ] && [ "$WITH_DRAFTS" != "0" ]; then
              ARGS="$ARGS --with-drafts $WITH_DRAFTS"
            fi
            echo "::notice::DRY RUN — args: $ARGS"
          fi
          mkdir -p runs
          # tee so we have BOTH the live logs AND a copy for the step summary.
          python -u scripts/search_and_score.py $ARGS 2>&1 | tee runs/run.log
          EXIT=${PIPESTATUS[0]}
          echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"
          exit $EXIT

      - name: Publish dry-run summary (always runs, self-diagnostic on failure)
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
        run: |
          set +e
          EXIT="${{ steps.run_search.outputs.exit_code }}"
          {
            echo ""
            echo "### cv-search exit code: \`${EXIT:-unknown}\`"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

          LATEST=""
          if ls -1d runs/_dry-* >/dev/null 2>&1; then
            LATEST=$(ls -1dt runs/_dry-* | head -n1)
          fi

          if [ -n "$LATEST" ] && [ -f "$LATEST/summary.md" ]; then
            cat "$LATEST/summary.md" >> "$GITHUB_STEP_SUMMARY"
          else
            {
              echo "## ⚠️ Pas de summary.md produit"
              echo ""
              echo "\`run_search\` n'est pas allé jusqu'au bout. Tail des logs :"
              echo ""
              echo '```'
              tail -n 120 runs/run.log 2>/dev/null || echo "(pas de runs/run.log)"
              echo '```'
              echo ""
              echo "### État du répertoire runs/"
              echo '```'
              find runs -maxdepth 3 -type f 2>/dev/null | head -n 60 || echo "(pas de dossier runs/)"
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload dry-run artifacts (runs/ + log, always)
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: dry-run-${{ github.run_id }}
          path: |
            runs/_dry-*/**
            runs/run.log
          if-no-files-found: warn
          retention-days: 14

      - name: Fail job if run_search failed
        if: ${{ steps.run_search.outputs.exit_code != '0' && steps.run_search.outputs.exit_code != '' }}
        run: |
          echo "::error::cv-search exited with code ${{ steps.run_search.outputs.exit_code }}"
          exit 1

      - name: Commit queue + per-job stubs
        if: ${{ (github.event_name == 'schedule' || inputs.dry_run != 'true') && steps.run_search.outputs.exit_code == '0' }}
        run: |
          git config user.name "cv-agent"
          git config user.email "cv-agent@users.noreply.github.com"
          git add -f runs/ data/state/ || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "daily-search: scored queue for $(date -u +%F)"
            git push
          fi

      - name: Format results for email
        if: ${{ (github.event_name == 'schedule' || inputs.dry_run != 'true') && steps.run_search.outputs.exit_code == '0' }}
        id: format_email
        run: |
          python3 - <<'EOF'
          import json, os, sys
          from pathlib import Path
          from datetime import datetime, timezone

          today = datetime.now(timezone.utc).strftime("%Y-%m-%d")
          queue_path = Path(f"runs/{today}/queue.jsonl")

          if not queue_path.exists():
              body = f"CV Agent — {today}\n\nAucune offre trouvée (queue.jsonl absent)."
              Path("/tmp/email_body.txt").write_text(body)
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("count=0\n")
                  f.write(f"subject=CV Agent — 0 offre le {today}\n")
              sys.exit(0)

          jobs = [json.loads(l) for l in queue_path.read_text().splitlines() if l.strip()]
          top = [j for j in jobs if j.get("score", 0) >= 80]
          mid = [j for j in jobs if 60 <= j.get("score", 0) < 80]

          lines = [
              f"CV Agent — Résultats du {today}",
              f"{len(jobs)} offre(s) analysée(s)\n",
          ]

          if top:
              lines.append("=== TOP MATCHES (score ≥ 80) ===\n")
              for j in top:
                  lines.append(f"★  {j.get('company','?')} — {j.get('title','?')}")
                  lines.append(f"   Score       : {j.get('score','?')}/100")
                  lines.append(f"   URL         : {j.get('url','')}")
                  lines.append(f"   Fingerprint : {j.get('fingerprint','')}")
                  lines.append(f"   Commande    : cv-generate --fingerprint {j.get('fingerprint','')}\n")

          if mid:
              lines.append("=== OFFRES INTÉRESSANTES (score 60–79) ===\n")
              for j in mid:
                  lines.append(f"◆  {j.get('company','?')} — {j.get('title','?')}")
                  lines.append(f"   Score       : {j.get('score','?')}/100")
                  lines.append(f"   URL         : {j.get('url','')}")
                  lines.append(f"   Fingerprint : {j.get('fingerprint','')}\n")

          if not top and not mid:
              lines.append("Aucune offre avec un score ≥ 60 aujourd'hui.\n")

          lines.append(f"Voir tous les résultats : https://github.com/davidperron/cv/tree/main/runs/{today}")

          Path("/tmp/email_body.txt").write_text("\n".join(lines))
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"count={len(jobs)}\n")
              f.write(f"subject=CV Agent — {len(jobs)} offre(s) le {today}\n")
          EOF

      - name: Send email notification
        if: ${{ (github.event_name == 'schedule' || inputs.dry_run != 'true') && steps.run_search.outputs.exit_code == '0' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.LINKEDIN_EMAIL }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.format_email.outputs.subject }}
          to: david.perron@gmx.fr
          from: CV Agent <${{ secrets.LINKEDIN_EMAIL }}>
          body: file:///tmp/email_body.txt
