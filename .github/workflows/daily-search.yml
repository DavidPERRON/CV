name: daily-search

on:
  schedule:
    # 05:45 UTC daily (07:45 Paris summer / 06:45 winter)
    - cron: "45 5 * * *"
  workflow_dispatch:
    inputs:
      language:
        description: "Output language (EN or FR)"
        required: false
        default: "EN"
      dry_run:
        description: "Smoke test: cap to a few postings, no commit, no state mutation"
        required: false
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      max_jobs:
        description: "Cap on postings (only used when dry_run=true)"
        required: false
        default: "3"
      with_drafts:
        description: "In dry_run, also draft full CV+cover for top N scored postings (costs LLM tokens)"
        required: false
        default: "1"

permissions:
  contents: write

jobs:
  search:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Secrets sanity check (names only, values never printed)
        run: |
          {
            echo "### Secrets wiring"
            echo ""
            echo "- ANTHROPIC_API_KEY: $([ -n \"${{ secrets.ANTHROPIC_API_KEY }}\" ] && echo OK || echo MISSING)"
            echo "- OPENAI_API_KEY:    $([ -n \"${{ secrets.OPENAI_API_KEY }}\" ] && echo OK || echo MISSING)"
            echo "- LINKEDIN_EMAIL:    $([ -n \"${{ secrets.LINKEDIN_EMAIL }}\" ] && echo OK || echo MISSING)"
            echo "- GMAIL_APP_PASSWORD:$([ -n \"${{ secrets.GMAIL_APP_PASSWORD }}\" ] && echo OK || echo MISSING)"
            echo ""
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Install
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run search
        id: run_search
        continue-on-error: true
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          LINKEDIN_EMAIL: ${{ secrets.LINKEDIN_EMAIL }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
          MAX_JOBS: ${{ github.event_name == 'workflow_dispatch' && inputs.max_jobs || '' }}
          WITH_DRAFTS: ${{ github.event_name == 'workflow_dispatch' && inputs.with_drafts || '0' }}
        run: |
          set +e
          ARGS="-v"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
            [ -n "$MAX_JOBS" ] && ARGS="$ARGS --max-jobs $MAX_JOBS"
            [ -n "$WITH_DRAFTS" ] && [ "$WITH_DRAFTS" != "0" ] && ARGS="$ARGS --with-drafts $WITH_DRAFTS"
            echo "::notice::DRY RUN — args: $ARGS"
          fi
          # Per-run log goes to runs/<date>/run.log (not a single global file)
          RUN_DATE=$(date -u +%F)
          mkdir -p "runs/$RUN_DATE"
          python -u scripts/search_and_score.py $ARGS 2>&1 | tee "runs/$RUN_DATE/run.log"
          EXIT=${PIPESTATUS[0]}
          echo "exit_code=$EXIT" >> "$GITHUB_OUTPUT"
          echo "run_date=$RUN_DATE" >> "$GITHUB_OUTPUT"
          exit $EXIT

      # ── Step summary — always, on every trigger ──────────────────────────
      - name: Build step summary and email body
        if: always()
        id: format_output
        run: |
          set +e
          EXIT="${{ steps.run_search.outputs.exit_code }}"
          RUN_DATE="${{ steps.run_search.outputs.run_date }}"
          RUN_DATE="${RUN_DATE:-$(date -u +%F)}"

          # Locate the queue.jsonl (dry-run uses a timestamped folder)
          QUEUE_PATH="runs/$RUN_DATE/queue.jsonl"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ inputs.dry_run }}" = "true" ]; then
            LATEST=""
            ls -1d runs/_dry-* >/dev/null 2>&1 && LATEST=$(ls -1dt runs/_dry-* | head -n1)
            if [ -n "$LATEST" ]; then
              QUEUE_PATH="$LATEST/queue.jsonl"
              [ -f "$LATEST/summary.md" ] && cat "$LATEST/summary.md" >> "$GITHUB_STEP_SUMMARY"
            fi
            echo "dry_run_dir=${LATEST:-}" >> "$GITHUB_OUTPUT"
          fi

          # Unified step summary + email body via script
          python3 scripts/format_summary.py \
            --date "$RUN_DATE" \
            --queue-path "$QUEUE_PATH" \
            --exit-code "${EXIT:-unknown}" \
            --github-step-summary "$GITHUB_STEP_SUMMARY" \
            --email-body /tmp/email_body.html \
            --github-output "$GITHUB_OUTPUT" \
            || true

          # Self-diagnostic tail if run_search failed
          if [ "${EXIT:-1}" != "0" ]; then
            {
              echo ""
              echo "### ⚠️ Tail des logs (run_search a échoué)"
              echo '```'
              tail -n 80 "runs/$RUN_DATE/run.log" 2>/dev/null || echo "(log absent)"
              echo '```'
              echo ""
              echo "### État runs/"
              echo '```'
              find runs -maxdepth 3 -type f 2>/dev/null | head -n 40
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Upload dry-run artifacts
        if: ${{ always() && github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: dry-run-${{ github.run_id }}
          path: |
            runs/_dry-*/**
            runs/${{ steps.run_search.outputs.run_date }}/run.log
          if-no-files-found: warn
          retention-days: 14

      - name: Fail job if run_search failed
        if: ${{ steps.run_search.outputs.exit_code != '0' && steps.run_search.outputs.exit_code != '' }}
        run: |
          echo "::error::cv-search exited with code ${{ steps.run_search.outputs.exit_code }}"
          exit 1

      # ── Commit — only on scheduled / non-dry runs ─────────────────────────
      - name: Commit results
        if: ${{ (github.event_name == 'schedule' || inputs.dry_run != 'true') && steps.run_search.outputs.exit_code == '0' }}
        run: |
          RUN_DATE="${{ steps.run_search.outputs.run_date }}"
          git config user.name "cv-agent"
          git config user.email "cv-agent@users.noreply.github.com"
          # Force-add the structured outputs, but NOT log files (too large / not useful in git)
          git add -f \
            "runs/$RUN_DATE/queue.jsonl" \
            "runs/$RUN_DATE/report.html" \
            "runs/$RUN_DATE/index.html" \
            "runs/$RUN_DATE"/**/job.json \
            "runs/$RUN_DATE"/**/scoring.json \
            "runs/$RUN_DATE"/**/status.txt \
            data/state/ \
            2>/dev/null || true
          # Also pick up the global runs/index.html if present
          git add -f runs/index.html 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "daily-search: scored queue for $RUN_DATE"
            git push
          fi

      # ── Email — only on scheduled / non-dry runs ──────────────────────────
      - name: Send email notification
        if: ${{ (github.event_name == 'schedule' || inputs.dry_run != 'true') && steps.run_search.outputs.exit_code == '0' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          username: ${{ secrets.LINKEDIN_EMAIL }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          subject: ${{ steps.format_output.outputs.subject }}
          to: david.perron@gmx.fr
          from: CV Agent <${{ secrets.LINKEDIN_EMAIL }}>
          html_body: file:///tmp/email_body.html
