name: approve-submit

# NOTE: this workflow generates the draft. It CANNOT submit automatically
# because submission requires an interactive browser session with the
# operator pressing ENTER to confirm. Actual submission happens locally:
#   cv-submit --fingerprint <fp> --cv-pdf path/to/cv.pdf
# This workflow only prepares the files (adapted CV + cover letter + HTML)
# and commits them to the branch for review.

on:
  workflow_dispatch:
    inputs:
      fingerprint:
        description: "Job fingerprint from runs/<date>/queue.jsonl"
        required: true
      language:
        description: "EN or FR"
        required: false
        default: "EN"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          pip install -r requirements.txt
          pip install -e .
      - name: Generate draft
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python scripts/generate_application.py \
            --fingerprint "${{ github.event.inputs.fingerprint }}" \
            --language "${{ github.event.inputs.language }}" -v
      - name: Commit draft
        run: |
          git config user.name "cv-agent"
          git config user.email "cv-agent@users.noreply.github.com"
          git add runs/ data/state/ || true
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "draft: ${{ github.event.inputs.fingerprint }}"
            git push
          fi
      - name: Next step
        run: |
          echo "Draft committed. To actually submit, run locally:"
          echo "  git pull"
          echo "  cv-submit --fingerprint ${{ github.event.inputs.fingerprint }} --cv-pdf path/to/cv.pdf"
