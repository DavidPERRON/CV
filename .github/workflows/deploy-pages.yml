name: deploy-pages

on:
  workflow_run:
    workflows: ["daily-search"]
    types: [completed]
    branches: [main]

  push:
    branches: [main]
    paths:
      - "public/**"
      - "runs/**"
      - "wrangler.jsonc"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build deploy bundle
        run: |
          mkdir -p dist
          cp -r public/. dist/
          if [ -d runs ]; then cp -r runs dist/runs; fi

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          echo '## Deploy diagnostics' >> $GITHUB_STEP_SUMMARY
          echo "- Token set: ${{ secrets.CLOUDFLARE_API_TOKEN != '' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Account ID set: ${{ secrets.CLOUDFLARE_ACCOUNT_ID != '' }}" >> $GITHUB_STEP_SUMMARY
          echo '' >> $GITHUB_STEP_SUMMARY
          WRANGLER_OUT=$(npx wrangler@latest deploy 2>&1) || true
          EXIT_CODE=$?
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "$WRANGLER_OUT" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          exit $EXIT_CODE
