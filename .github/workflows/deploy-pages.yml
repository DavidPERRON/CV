name: deploy-pages

on:
  workflow_run:
    workflows: ["daily-search"]
    types: [completed]
    branches: [main]

  push:
    branches: [main]
    paths:
      - "public/**"
      - "runs/**"
      - "src/cv_agent/render/templates/**"

  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    if: >
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build deploy bundle
        run: |
          mkdir -p dist
          cp -r public/. dist/
          if [ -d runs ]; then
            cp -r runs dist/runs
          fi
          echo "dist/ contents:"
          find dist -maxdepth 3 -type f | head -40

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_PROJECT_NAME: ${{ secrets.CLOUDFLARE_PROJECT_NAME }}
        run: |
          PROJECT="${CLOUDFLARE_PROJECT_NAME:-ashcroftedition}"
          # Create project if it does not exist yet (idempotent)
          npx wrangler@latest pages project create "$PROJECT" \
            --production-branch=main 2>&1 || true
          # Deploy
          npx wrangler@latest pages deploy dist \
            --project-name="$PROJECT" \
            --commit-dirty=true
